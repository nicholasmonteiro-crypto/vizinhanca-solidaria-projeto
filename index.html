<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vizinhança Solidária</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/style.css" />
</head>
<body>

  <header>
    <h1>Vizinhança Solidária</h1>
    <p>Conectando quem tem com quem precisa</p>
    <a href="doar.html" class="btn-primary">+ Quero Doar</a>
  </header>

  <main>
    <div id="contador-doacoes" class="contador-doacoes" aria-live="polite">
      <span class="contador-icon" aria-hidden="true">📦</span>
      <span class="contador-numero">0</span>
      <span class="contador-texto">doações disponíveis</span>
    </div>

    <section class="filtro" aria-label="Filtro de doações">
      <label for="filtroBairro">Filtrar por bairro:</label>
      <input
        type="search"
        id="filtroBairro"
        placeholder="Buscar por bairro ou alimento..."
        autocomplete="off"
        aria-describedby="filtro-dica"
      />
      <span id="filtro-dica" class="sr-only">Digite o nome do bairro ou do alimento para filtrar as doações</span>
    </section>

    <section id="lista-doacoes" class="lista-doacoes" aria-label="Lista de doações disponíveis">
      <!-- Cards gerados pelo JavaScript -->
    </section>

    <div class="paginacao-container">
      <button type="button" id="btn-carregar-mais" class="btn-carregar-mais" hidden>Carregar mais</button>
    </div>
  </main>

  <footer>
    <p>Projeto acadêmico — Desenvolvimento de Software para a Sociedade</p>
  </footer>

  <script src="src/js/app.js"></script>
</body>
</html>
